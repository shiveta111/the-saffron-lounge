# Nginx Configuration for Saffron Staging Server
# This should be added to your nginx site configuration

server {
    listen 80;
    server_name saffron-staging.ekarigar.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name saffron-staging.ekarigar.com;

    # SSL configuration (your existing SSL settings)
    # ssl_certificate /path/to/cert.pem;
    # ssl_certificate_key /path/to/key.pem;

    # Important: Set client max body size for file uploads
    client_max_body_size 10M;

    # CORS headers for all responses
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # Handle OPTIONS requests for CORS preflight
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # ============================================
    # CRITICAL: Serve static assets directly
    # ============================================
    # Option 1: Serve from Node.js backend (recommended if using Docker)
    location /assets/ {
        # Proxy to Node.js backend which serves via express.static
        proxy_pass http://localhost:8000/assets/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache static assets
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # CORS headers for images
        add_header Access-Control-Allow-Origin $http_origin always;
    }

    # Option 2: Serve directly from filesystem (faster, if files are accessible)
    # Uncomment this if you prefer nginx to serve files directly
    # location /assets/ {
    #     alias /path/to/your/backend/public/assets/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    #     add_header Access-Control-Allow-Origin $http_origin always;
    #     try_files $uri =404;
    # }

    # Proxy API requests to Node.js backend
    location /api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Increase timeouts for uploads
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Proxy WebSocket connections
    location /ws/ {
        proxy_pass http://localhost:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend - Next.js app (if serving from same domain)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# ============================================
# TROUBLESHOOTING STEPS:
# ============================================
# 
# 1. Test nginx configuration:
#    sudo nginx -t
#
# 2. Reload nginx:
#    sudo systemctl reload nginx
#
# 3. Check nginx error logs:
#    sudo tail -f /var/log/nginx/error.log
#
# 4. Test if backend is serving files:
#    curl -I http://localhost:8000/assets/uploads/products/some-file.webp
#
# 5. Test if nginx is serving files:
#    curl -I https://saffron-staging.ekarigar.com/assets/uploads/products/some-file.webp
#
# 6. Check file permissions:
#    ls -la /path/to/backend/public/assets/uploads/products/
#    # Should show files with 644 permissions
#
# 7. Verify backend is running:
#    pm2 list
#    # or
#    systemctl status your-backend-service
#
